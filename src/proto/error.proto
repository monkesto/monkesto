syntax = "proto3";

package proto.error;

message IdentError {
  oneof ident_error_type {
    string parse = 1;
    string invalid_id = 2;
  }
}

message NameError {
  oneof name_error_type {
    string too_short = 1;
    string too_long = 2;
  }
}

message JournalError {
  oneof journal_error_type {
    string id_collision = 1;
    string invalid_journal = 2;
    string invalid_user = 3;
    int32 permissions = 4;
    string user_already_has_access = 5;
    string used_doesnt_have_access = 6;
    IdentError ident_creation = 7;
    string sqlx = 8;
    int32 permission_decode = 9;
  }
}



message UserError {
  message UserNotFound {}

  oneof user_error_type {
    string email_conflict = 1;
    string email_doesnt_exist = 2;
    string id_collision = 3;
    string user_doesnt_exist = 4;
    UserNotFound user_not_found = 5;
    string sqlx = 6;
    string seed_failure = 7;
  }
}

message MonkestoError {
  bytes error_decode = 1;
  NameError name_creation = 2;
  IdentError ident_creation = 3;
  string email_creation = 4;
  JournalError journal = 5;
  UserError user = 6;
}



